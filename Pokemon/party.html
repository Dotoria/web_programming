<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" href="poketest.css">
    <link href="favicon.ico" rel="icon" type="image/x-icon" />
    <script src="type.js"></script>
    <title>Poketest - 우리끼리 상성</title>
</head>
<body>
    <header class="simple">
        <h1>우리끼리 상성 보기</h1>
    </header>

    <div class="wrap">
        <section class="card">
            <h2>멤버 추가</h2>
            <p>친구가 공유한 결과 링크를 붙여넣거나, 타입을 직접 골라 멤버를 추가하세요. (최대 8명)</p>
            <div class="party-form">
                <label class="field-label" for="member-name">이름</label>
                <input type="text" id="member-name" maxlength="10" placeholder="예: 지우">

                <label class="field-label" for="member-code">결과 링크 (또는 공유 코드)</label>
                <input type="text" id="member-code" placeholder="https://.../result.html?s=21-28-...">

                <div class="party-or">링크가 없다면 타입을 직접 선택</div>
                <div class="party-selects">
                    <select id="member-type1"></select>
                    <select id="member-type2"></select>
                </div>

                <div class="actions">
                    <button type="button" id="add-member">멤버 추가</button>
                </div>
                <div id="party-error" class="party-error" hidden></div>
            </div>
        </section>

        <section class="card" id="members-card" hidden>
            <h2>파티 멤버</h2>
            <div id="member-list" class="member-list"></div>
        </section>

        <section class="card" id="graph-card" hidden>
            <h2>상성 그래프</h2>
            <p>화살표는 "누가 누구에게 잘 통하는가"를 뜻해요. 굵고 진할수록 강한 우위(×4)예요.</p>
            <div class="graph-holder"><svg id="party-graph" viewBox="0 0 400 400"></svg></div>
        </section>

        <section class="card" id="matrix-card" hidden>
            <h2>상성 표</h2>
            <p>가로줄의 멤버가 세로칸의 멤버를 공격할 때, 가장 잘 통하는 배율이에요.</p>
            <div class="table-scroll"><table class="party-matrix" id="party-matrix"></table></div>
            <div id="pair-summary" class="pair-summary"></div>
        </section>

        <div class="actions">
            <input type="button" class="secondary" value="내 결과로 돌아가기" onclick="location.href='result.html'" />
            <input type="button" class="secondary" value="처음으로" onclick="location.href='index.html'" />
        </div>
    </div>

    <script>
        var PARTY_KEY = 'poketestPartyV1';
        var MAX_MEMBERS = 8;

        var members = [];
        try {
            members = JSON.parse(localStorage.getItem(PARTY_KEY)) || [];
        } catch (e) { members = []; }

        function saveParty() {
            localStorage.setItem(PARTY_KEY, JSON.stringify(members));
        }

        // 타입 선택 셀렉트 채우기
        function fillSelect(sel, emptyLabel) {
            var html = '<option value="">' + emptyLabel + '</option>';
            for (var i = 0; i < TYPE_ORDER.length; i++) {
                var t = TYPE_ORDER[i];
                html += '<option value="' + t + '">' + TYPE_INFO[t].icon + ' ' + TYPE_INFO[t].name + '</option>';
            }
            sel.innerHTML = html;
        }
        fillSelect(document.getElementById('member-type1'), '제 1 타입 선택');
        fillSelect(document.getElementById('member-type2'), '제 2 타입 (없으면 단일)');

        function showError(msg) {
            var el = document.getElementById('party-error');
            el.textContent = msg;
            el.hidden = false;
        }
        function clearError() {
            document.getElementById('party-error').hidden = true;
        }

        function memberChip(m, idx) {
            var chips = '';
            for (var i = 0; i < m.types.length; i++) {
                var t = TYPE_INFO[m.types[i]];
                chips += '<span class="type-chip" style="--chip-color:' + t.color + '">' +
                    '<span class="type-chip-icon">' + t.icon + '</span>' + t.name + '</span>';
            }
            return '<div class="member-item">' +
                '<span class="member-name">' + escapeHtml(m.name) + '</span>' +
                '<span class="member-types">' + chips + '</span>' +
                '<button type="button" class="member-remove" data-idx="' + idx + '" title="삭제">✕</button>' +
                '</div>';
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // 이름 뒤에 붙는 주격 조사: 받침이 있으면 "이", 없으면 "가", 한글이 아니면 "이(가)"
        function subjectJosa(name) {
            var last = name.charAt(name.length - 1);
            var code = last.charCodeAt(0);
            if (code < 0xAC00 || code > 0xD7A3) return '이(가)';
            return ((code - 0xAC00) % 28 === 0) ? '가' : '이';
        }

        function multLabel(m) {
            if (m === 4) return '×4';
            if (m === 2) return '×2';
            if (m === 1) return '×1';
            if (m === 0.5) return '×½';
            if (m === 0.25) return '×¼';
            if (m === 0) return '×0';
            return '×' + m;
        }

        function multClass(m) {
            if (m >= 4) return 'mx4';
            if (m >= 2) return 'mx2';
            if (m === 1) return 'mx1';
            if (m === 0) return 'mx0';
            return 'mxhalf';
        }

        function renderMembers() {
            var listEl = document.getElementById('member-list');
            var html = '';
            for (var i = 0; i < members.length; i++) {
                html += memberChip(members[i], i);
            }
            listEl.innerHTML = html;
            document.getElementById('members-card').hidden = (members.length === 0);
            document.getElementById('graph-card').hidden = (members.length < 2);
            document.getElementById('matrix-card').hidden = (members.length < 2);

            if (members.length >= 2) {
                renderMatrix();
                renderGraph();
            }
        }

        function renderMatrix() {
            var html = '<tr><th class="corner">공격 ↓ \\ 수비 →</th>';
            for (var c = 0; c < members.length; c++) {
                html += '<th>' + escapeHtml(members[c].name) + '</th>';
            }
            html += '</tr>';

            for (var r = 0; r < members.length; r++) {
                html += '<tr><th>' + escapeHtml(members[r].name) + '</th>';
                for (var c2 = 0; c2 < members.length; c2++) {
                    if (r === c2) {
                        html += '<td class="self">—</td>';
                    } else {
                        var m = bestAttackMultiplier(members[r].types, members[c2].types);
                        html += '<td class="' + multClass(m) + '">' + multLabel(m) + '</td>';
                    }
                }
                html += '</tr>';
            }
            document.getElementById('party-matrix').innerHTML = html;

            // 페어별 요약
            var lines = [];
            for (var a = 0; a < members.length; a++) {
                for (var b = a + 1; b < members.length; b++) {
                    var ab = bestAttackMultiplier(members[a].types, members[b].types);
                    var ba = bestAttackMultiplier(members[b].types, members[a].types);
                    var na = escapeHtml(members[a].name), nb = escapeHtml(members[b].name);
                    var text;
                    if (ab > ba) text = '<strong>' + na + '</strong>' + subjectJosa(members[a].name) + ' 우세해요 (' + multLabel(ab) + ' vs ' + multLabel(ba) + ')';
                    else if (ba > ab) text = '<strong>' + nb + '</strong>' + subjectJosa(members[b].name) + ' 우세해요 (' + multLabel(ba) + ' vs ' + multLabel(ab) + ')';
                    else text = '팽팽한 맞수예요 (서로 ' + multLabel(ab) + ')';
                    lines.push('<li>' + na + ' ↔ ' + nb + ' : ' + text + '</li>');
                }
            }
            document.getElementById('pair-summary').innerHTML = '<ul>' + lines.join('') + '</ul>';
        }

        function renderGraph() {
            var svg = document.getElementById('party-graph');
            var n = members.length;
            var cx = 200, cy = 200, radius = 140;
            var pos = [];
            for (var i = 0; i < n; i++) {
                var ang = (Math.PI * 2 * i / n) - Math.PI / 2;
                pos.push({ x: cx + radius * Math.cos(ang), y: cy + radius * Math.sin(ang) });
            }

            var parts = [];
            parts.push('<defs>' +
                '<marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">' +
                '<path d="M 0 0 L 10 5 L 0 10 z" fill="#f08030"/></marker>' +
                '<marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">' +
                '<path d="M 0 0 L 10 5 L 0 10 z" fill="#d63a55"/></marker>' +
                '</defs>');

            // 우위(×2 이상) 화살표. 노드 원(반지름 30)에 닿지 않게 안쪽으로 줄이고,
            // 양방향이 겹치지 않도록 수직 방향으로 살짝 휘어지는 곡선으로 그린다.
            for (var a = 0; a < n; a++) {
                for (var b = 0; b < n; b++) {
                    if (a === b) continue;
                    var m = bestAttackMultiplier(members[a].types, members[b].types);
                    if (m < 2) continue;
                    var p1 = pos[a], p2 = pos[b];
                    var dx = p2.x - p1.x, dy = p2.y - p1.y;
                    var len = Math.sqrt(dx * dx + dy * dy);
                    var ux = dx / len, uy = dy / len;
                    var sx = p1.x + ux * 34, sy = p1.y + uy * 34;
                    var ex = p2.x - ux * 36, ey = p2.y - uy * 36;
                    var mxp = (sx + ex) / 2 - uy * 18;
                    var myp = (sy + ey) / 2 + ux * 18;
                    var color = (m >= 4) ? '#d63a55' : '#f08030';
                    var width = (m >= 4) ? 3.5 : 2.2;
                    var marker = (m >= 4) ? 'url(#arrow4)' : 'url(#arrow2)';
                    parts.push('<path d="M ' + sx.toFixed(1) + ' ' + sy.toFixed(1) +
                        ' Q ' + mxp.toFixed(1) + ' ' + myp.toFixed(1) + ' ' + ex.toFixed(1) + ' ' + ey.toFixed(1) +
                        '" fill="none" stroke="' + color + '" stroke-width="' + width + '" marker-end="' + marker + '" opacity="0.85"/>');
                }
            }

            // 노드
            for (var k = 0; k < n; k++) {
                var mem = members[k];
                var color1 = TYPE_INFO[mem.types[0]].color;
                var color2 = TYPE_INFO[mem.types[1] || mem.types[0]].color;
                var gid = 'grad' + k;
                parts.push('<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="1" y2="1">' +
                    '<stop offset="0%" stop-color="' + color1 + '"/><stop offset="100%" stop-color="' + color2 + '"/>' +
                    '</linearGradient></defs>');
                parts.push('<circle cx="' + pos[k].x.toFixed(1) + '" cy="' + pos[k].y.toFixed(1) +
                    '" r="30" fill="url(#' + gid + ')" stroke="#fff" stroke-width="3"/>');
                var icons = '';
                for (var ti = 0; ti < mem.types.length; ti++) icons += TYPE_INFO[mem.types[ti]].icon;
                parts.push('<text x="' + pos[k].x.toFixed(1) + '" y="' + (pos[k].y + 1).toFixed(1) +
                    '" text-anchor="middle" dominant-baseline="middle" font-size="16">' + icons + '</text>');
                parts.push('<text x="' + pos[k].x.toFixed(1) + '" y="' + (pos[k].y + 46).toFixed(1) +
                    '" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a2138">' +
                    escapeHtml(mem.name) + '</text>');
            }

            svg.innerHTML = parts.join('');
        }

        function addMember() {
            clearError();
            if (members.length >= MAX_MEMBERS) {
                showError('멤버는 최대 ' + MAX_MEMBERS + '명까지 추가할 수 있어요.');
                return;
            }
            var name = document.getElementById('member-name').value.trim();
            if (!name) {
                showError('이름을 입력해주세요.');
                return;
            }

            var code = document.getElementById('member-code').value.trim();
            var types = null;

            if (code) {
                var data = decodeShareCode(code);
                if (!data) {
                    showError('결과 링크(코드) 형식을 읽을 수 없어요. 링크 전체를 그대로 붙여넣어 주세요.');
                    return;
                }
                types = decideResult(data.averages).types;
            } else {
                var t1 = document.getElementById('member-type1').value;
                var t2 = document.getElementById('member-type2').value;
                if (!t1) {
                    showError('결과 링크를 붙여넣거나 제 1 타입을 선택해주세요.');
                    return;
                }
                types = (t2 && t2 !== t1) ? [t1, t2] : [t1];
            }

            members.push({ name: name, types: types });
            saveParty();
            renderMembers();

            document.getElementById('member-name').value = '';
            document.getElementById('member-code').value = '';
            document.getElementById('member-type1').value = '';
            document.getElementById('member-type2').value = '';
        }

        document.getElementById('add-member').addEventListener('click', addMember);
        document.getElementById('member-list').addEventListener('click', function (e) {
            if (!e.target.classList.contains('member-remove')) return;
            members.splice(parseInt(e.target.getAttribute('data-idx'), 10), 1);
            saveParty();
            renderMembers();
        });

        // result.html에서 "친구들과 상성 보기"로 넘어온 경우: 내 코드가 미리 채워짐
        var addParam = location.search.match(/[?&]add=([0-9-]+)/);
        if (addParam) {
            document.getElementById('member-code').value = addParam[1];
            document.getElementById('member-name').value = '나';
        }

        renderMembers();
    </script>

    <footer>
        <a href="index.html">Poketest 홈</a>
    </footer>
</body>
</html>
